<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>院校对比 - 智填志愿</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { padding-top: 68px; }
    .compare-page { padding: 40px 0 80px; }

    .compare-header-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }

    .compare-header-card h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
    .compare-header-card p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px; }

    .compare-search-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .compare-select-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .compare-select-wrap input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
    }
    .compare-select-wrap input:focus { border-color: var(--primary); }

    .add-compare-btn {
      padding: 10px 20px;
      background: var(--primary);
      color: #fff;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all 0.2s;
    }
    .add-compare-btn:hover { background: var(--primary-dark); }

    /* 已选学校 */
    .selected-schools {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .selected-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--primary-light);
      border: 1.5px solid var(--primary);
      border-radius: 20px;
      font-size: 0.88rem;
      color: var(--primary);
      font-weight: 500;
    }
    .remove-tag {
      cursor: pointer;
      color: var(--primary);
      font-size: 1.1rem;
      line-height: 1;
    }

    /* 对比表格 */
    .compare-table-wrap {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .compare-table {
      width: 100%;
      border-collapse: collapse;
    }

    .compare-table th {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: #fff;
      padding: 14px 20px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .compare-table th:first-child { text-align: left; background: #0f172a; }

    .compare-table td {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      text-align: center;
      font-size: 0.9rem;
      vertical-align: middle;
    }
    .compare-table td:first-child { text-align: left; font-weight: 500; color: var(--text-secondary); background: #f8fafc; }

    .compare-table tr:hover td { background: #f0f9ff; }
    .compare-table tr:hover td:first-child { background: #e8f0fe; }

    .compare-val-highlight {
      color: var(--primary);
      font-weight: 700;
    }
    .compare-val-best {
      color: var(--success);
      font-weight: 700;
    }

    .chart-area {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-top: 24px;
      box-shadow: var(--shadow-sm);
    }
    .chart-area h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; }

    .bar-chart { display: flex; flex-direction: column; gap: 16px; }
    .bar-row {
      display: grid;
      grid-template-columns: 160px 1fr 80px;
      gap: 12px;
      align-items: center;
    }
    .bar-label { font-size: 0.88rem; color: var(--text-secondary); }
    .bar-val { font-size: 0.88rem; font-weight: 600; text-align: right; }

    .empty-tip {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-tip p { margin-top: 12px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <span class="logo-icon">🎓</span>
        <span class="logo-text">智填志愿</span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="score.html">成绩分析</a></li>
        <li><a href="school.html">院校查询</a></li>
        <li><a href="recommend.html">智能推荐</a></li>
        <li><a href="ai-chat.html">AI咨询</a></li>
        <li><a href="guide.html">填报指南</a></li>
      </ul>
      <div class="nav-actions">
        <a href="login.html" class="btn-outline">登录</a>
        <a href="register.html" class="btn-primary">免费注册</a>
      </div>
    </div>
  </nav>

  <div class="compare-page">
    <div class="container">
      <div class="compare-header-card">
        <h2>院校多维对比</h2>
        <p>添加2-4所院校进行多维度横向比较，辅助你做出最理性的选择</p>

        <div class="compare-search-row">
          <div class="compare-select-wrap">
            <input type="text" id="schoolSearch" placeholder="搜索院校名称..." list="schoolOptions" onchange="selectSchool()">
            <datalist id="schoolOptions"></datalist>
          </div>
          <button class="add-compare-btn" onclick="addSchool()">+ 添加对比</button>
          <button class="btn btn-ghost" onclick="clearAll()">清空重选</button>
        </div>

        <div class="selected-schools" id="selectedSchools">
          <!-- 默认加两个 -->
        </div>
      </div>

      <div id="compareContent">
        <div class="empty-tip">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5">
            <line x1="18" y1="20" x2="18" y2="10"></line>
            <line x1="12" y1="20" x2="12" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="14"></line>
          </svg>
          <p>请添加至少2所院校开始对比</p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/schools-data.js"></script>
  <script>
    let compareList = [];

    // 填充datalist
    const dl = document.getElementById('schoolOptions');
    schoolsData.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.name;
      dl.appendChild(opt);
    });

    function addSchool() {
      const name = document.getElementById('schoolSearch').value.trim();
      if (!name) { showToast('请输入学校名称', 'error'); return; }
      const school = schoolsData.find(s => s.name === name);
      if (!school) { showToast('未找到该院校，请从列表中选择', 'error'); return; }
      if (compareList.find(s => s.id === school.id)) { showToast('该院校已在对比列表中', 'error'); return; }
      if (compareList.length >= 4) { showToast('最多同时对比4所院校', 'error'); return; }

      compareList.push(school);
      document.getElementById('schoolSearch').value = '';
      renderSelectedTags();
      renderCompare();
    }

    function selectSchool() {
      // datalist选择后自动处理
    }

    function removeSchool(id) {
      compareList = compareList.filter(s => s.id !== id);
      renderSelectedTags();
      renderCompare();
    }

    function clearAll() {
      compareList = [];
      renderSelectedTags();
      renderCompare();
    }

    function renderSelectedTags() {
      document.getElementById('selectedSchools').innerHTML = compareList.map(s => `
        <div class="selected-tag">
          ${s.name}
          <span class="remove-tag" onclick="removeSchool(${s.id})">×</span>
        </div>
      `).join('');
    }

    function renderCompare() {
      const el = document.getElementById('compareContent');
      if (compareList.length < 2) {
        el.innerHTML = `<div class="empty-tip">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5">
            <line x1="18" y1="20" x2="18" y2="10"></line>
            <line x1="12" y1="20" x2="12" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="14"></line>
          </svg>
          <p>已添加 ${compareList.length} 所，请至少添加2所院校开始对比</p>
        </div>`;
        return;
      }

      const attrs = [
        { key: 'city', label: '所在城市' },
        { key: 'nature', label: '院校性质' },
        { key: 'type', label: '院校类型' },
        { key: 'score', label: '2025广东录取线', fmt: v => `<span class="compare-val-highlight">${v}分</span>` },
        { key: 'majors', label: '开设专业数' },
        { key: 'tags', label: '院校标签', fmt: v => v.map(t => `<span class="badge badge-blue">${t}</span>`).join(' ') },
      ];

      const rows = attrs.map(attr => {
        const cells = compareList.map(s => {
          const val = s[attr.key];
          return `<td>${attr.fmt ? attr.fmt(val) : val}</td>`;
        }).join('');
        return `<tr><td>${attr.label}</td>${cells}</tr>`;
      }).join('');

      el.innerHTML = `
        <div class="compare-table-wrap">
          <table class="compare-table">
            <thead>
              <tr>
                <th>对比项目</th>
                ${compareList.map(s => `<th>${s.name}</th>`).join('')}
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>

        <div class="chart-area">
          <h3>录取分数线对比</h3>
          <div class="bar-chart">
            ${compareList.map(s => {
              const maxScore = Math.max(...compareList.map(x => x.score));
              const pct = Math.round((s.score / maxScore) * 100);
              return `
                <div class="bar-row">
                  <div class="bar-label">${s.name}</div>
                  <div class="progress-bar">
                    <div class="progress-fill" style="width:${pct}%"></div>
                  </div>
                  <div class="bar-val">${s.score}分</div>
                </div>`;
            }).join('')}
          </div>
        </div>
      `;
    }

    // 默认加两所
    const defaults = schoolsData.filter(s => s.name === '中山大学' || s.name === '华南理工大学');
    defaults.forEach(s => compareList.push(s));
    renderSelectedTags();
    renderCompare();
  </script>
</body>
</html>
