<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 智填志愿</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body {
      background: linear-gradient(135deg, #0c1f5e 0%, #1e3a8a 40%, #4338ca 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-box {
      background: #fff;
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 32px;
    }

    .auth-logo span:first-child { font-size: 2rem; }

    .auth-title { font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .auth-sub { font-size: 0.9rem; color: var(--text-muted); text-align: center; margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }

    .input-wrap { position: relative; }
    .input-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }
    .auth-input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--primary); }

    .auth-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s;
      margin-top: 8px;
    }
    .auth-btn:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37,99,235,0.35); }

    .auth-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
    }
    .auth-links a { font-size: 0.88rem; color: var(--primary); }
    .auth-links a:hover { text-decoration: underline; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .divider::before,
    .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .social-btns { display: flex; gap: 12px; }
    .social-btn {
      flex: 1;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.88rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: inherit;
      background: #fff;
      transition: all 0.2s;
    }
    .social-btn:hover { border-color: var(--primary); background: var(--primary-light); }

    .register-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .register-link a { color: var(--primary); font-weight: 600; }

    .remember-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .remember-row label { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--text-secondary); cursor: pointer; }
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="auth-logo">
      <span>🎓</span>
      <span>智填志愿</span>
    </div>

    <h1 class="auth-title">欢迎回来</h1>
    <p class="auth-sub">登录后可保存你的志愿方案</p>

    <div class="form-group">
      <label class="form-label">手机号/邮箱</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <input type="text" class="auth-input" id="loginId" placeholder="请输入手机号或邮箱">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">密码</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0110 0v4"></path>
        </svg>
        <input type="password" class="auth-input" id="loginPwd" placeholder="请输入密码">
      </div>
    </div>

    <div class="remember-row">
      <label><input type="checkbox" id="remember"> 记住我</label>
      <a href="#">忘记密码？</a>
    </div>

    <button class="auth-btn" onclick="doLogin()">登录</button>

    <div class="divider">或通过以下方式登录</div>

    <div class="social-btns">
      <button class="social-btn">💬 微信登录</button>
      <button class="social-btn">📱 手机验证码</button>
    </div>

    <div class="register-link">
      还没有账号？ <a href="register.html">立即注册</a>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    function doLogin() {
      const id = document.getElementById('loginId').value;
      const pwd = document.getElementById('loginPwd').value;
      if (!id || !pwd) { showToast('请填写账号和密码', 'error'); return; }
      showToast('登录成功，正在跳转...', 'success');
      setTimeout(() => { location.href = 'index.html'; }, 1200);
    }

    document.querySelectorAll('.auth-input').forEach(input => {
      input.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    });
  </script>
</body>
</html>
