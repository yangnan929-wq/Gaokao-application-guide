<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成绩分析 - 智填志愿</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { padding-top: 68px; }
    .score-page { padding: 40px 0 80px; }

    .score-form-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px;
      margin-bottom: 32px;
      box-shadow: var(--shadow-sm);
    }
    .score-form-card h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .score-form-card > p { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 28px; }

    .form-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }

    .score-breakdown {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .score-breakdown h4 { font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 14px; }
    .score-subjects {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
    }

    .btn-analyze {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 600;
      margin-top: 24px;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all 0.3s;
    }
    .btn-analyze:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37,99,235,0.3); }

    /* 结果区 */
    .result-area { display: none; }
    .result-area.show { display: block; }

    .result-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }

    .result-card {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 24px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .result-card .r-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
    .result-card .r-value {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-card .r-unit { font-size: 0.9rem; color: var(--text-secondary); margin-top: 4px; }

    /* 分段统计 */
    .segment-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-bottom: 24px;
    }
    .segment-card h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; }

    .segment-bars { display: flex; flex-direction: column; gap: 14px; }
    .segment-row {
      display: grid;
      grid-template-columns: 120px 1fr 80px;
      gap: 12px;
      align-items: center;
    }
    .segment-label { font-size: 0.9rem; color: var(--text-secondary); }
    .segment-value { font-size: 0.9rem; font-weight: 600; text-align: right; }

    /* 可报范围 */
    .range-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
    }
    .range-card h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; }
    .range-sections {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .range-section {
      border-radius: 12px;
      padding: 20px;
    }
    .range-section.rush { background: #fef3c7; border: 1px solid #fde68a; }
    .range-section.stable { background: #dcfce7; border: 1px solid #bbf7d0; }
    .range-section.safe { background: #dbeafe; border: 1px solid #bfdbfe; }
    .range-section h4 { font-size: 0.95rem; font-weight: 600; margin-bottom: 12px; }
    .range-section.rush h4 { color: #92400e; }
    .range-section.stable h4 { color: #166534; }
    .range-section.safe h4 { color: #1e40af; }
    .range-school-list { display: flex; flex-direction: column; gap: 8px; }
    .range-school-item {
      background: rgba(255,255,255,0.7);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.88rem;
    }
    .range-school-name { font-weight: 500; }
    .range-school-score { font-size: 0.8rem; color: var(--text-muted); }

    @media (max-width: 768px) {
      .form-row { grid-template-columns: 1fr 1fr; }
      .score-subjects { grid-template-columns: repeat(3, 1fr); }
      .result-cards { grid-template-columns: repeat(2, 1fr); }
      .range-sections { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <span class="logo-icon">🎓</span>
        <span class="logo-text">智填志愿</span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="score.html" class="active">成绩分析</a></li>
        <li><a href="school.html">院校查询</a></li>
        <li><a href="recommend.html">智能推荐</a></li>
        <li><a href="ai-chat.html">AI咨询</a></li>
        <li><a href="guide.html">填报指南</a></li>
      </ul>
      <div class="nav-actions">
        <a href="login.html" class="btn-outline">登录</a>
        <a href="register.html" class="btn-primary">免费注册</a>
      </div>
    </div>
  </nav>

  <div class="score-page">
    <div class="container">
      <!-- 表单 -->
      <div class="score-form-card">
        <h2>成绩智能分析</h2>
        <p>输入你的高考分数，系统自动计算全省排名，精准定位可报考院校范围</p>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">高考总分 <span style="color:#dc2626">*</span></label>
            <input type="number" class="form-input" id="totalScore" placeholder="如：620" min="0" max="750">
          </div>
          <div class="form-group">
            <label class="form-label">所在省份 <span style="color:#dc2626">*</span></label>
            <select class="form-select" id="province">
              <option value="">请选择</option>
              <option value="guangdong">广东</option>
              <option value="beijing">北京</option>
              <option value="shanghai">上海</option>
              <option value="jiangsu">江苏</option>
              <option value="zhejiang">浙江</option>
              <option value="shandong">山东</option>
              <option value="henan">河南</option>
              <option value="hubei">湖北</option>
              <option value="hunan">湖南</option>
              <option value="sichuan">四川</option>
              <option value="fujian">福建</option>
              <option value="anhui">安徽</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">科目类型 <span style="color:#dc2626">*</span></label>
            <select class="form-select" id="subject">
              <option value="">请选择</option>
              <option value="理科">理科（物理）</option>
              <option value="文科">文科（历史）</option>
              <option value="新高考">新高考</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">高考年份</label>
            <select class="form-select" id="year">
              <option value="2026">2026年</option>
              <option value="2025">2025年</option>
            </select>
          </div>
        </div>

        <div class="score-breakdown">
          <h4>各科分数（选填，用于更精准分析）</h4>
          <div class="score-subjects">
            <div class="form-group">
              <label class="form-label">语文</label>
              <input type="number" class="form-input" id="chinese" placeholder="满分150" min="0" max="150">
            </div>
            <div class="form-group">
              <label class="form-label">数学</label>
              <input type="number" class="form-input" id="math" placeholder="满分150" min="0" max="150">
            </div>
            <div class="form-group">
              <label class="form-label">外语</label>
              <input type="number" class="form-input" id="english" placeholder="满分150" min="0" max="150">
            </div>
            <div class="form-group">
              <label class="form-label">物/史</label>
              <input type="number" class="form-input" id="sub1" placeholder="满分100" min="0" max="150">
            </div>
            <div class="form-group">
              <label class="form-label">化/地</label>
              <input type="number" class="form-input" id="sub2" placeholder="满分100" min="0" max="150">
            </div>
            <div class="form-group">
              <label class="form-label">生/政</label>
              <input type="number" class="form-input" id="sub3" placeholder="满分100" min="0" max="150">
            </div>
          </div>
        </div>

        <button class="btn-analyze" onclick="analyzeScore()">开始分析我的成绩</button>
      </div>

      <!-- 分析结果 -->
      <div class="result-area" id="resultArea">
        <div class="result-cards">
          <div class="result-card">
            <div class="r-label">高考总分</div>
            <div class="r-value" id="rScore">-</div>
            <div class="r-unit">分（满分750）</div>
          </div>
          <div class="result-card">
            <div class="r-label">全省排名（估算）</div>
            <div class="r-value" id="rRank">-</div>
            <div class="r-unit">名</div>
          </div>
          <div class="result-card">
            <div class="r-label">超出一本线</div>
            <div class="r-value" id="rLine1">-</div>
            <div class="r-unit">分</div>
          </div>
          <div class="result-card">
            <div class="r-label">可报院校数量（估算）</div>
            <div class="r-value" id="rCount">-</div>
            <div class="r-unit">所</div>
          </div>
        </div>

        <div class="segment-card">
          <h3>成绩分段分析</h3>
          <div class="segment-bars" id="segmentBars"></div>
        </div>

        <div class="range-card">
          <h3>可报院校推荐（基于2025年广东省数据）</h3>
          <div class="range-sections" id="rangeSections"></div>
          <div style="margin-top:20px;text-align:center;">
            <button class="btn btn-blue" onclick="location.href='recommend.html'">
              查看完整志愿推荐方案 →
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    // 广东省参考数据
    const gd2025 = {
      '理科': { line1: 535, line2: 430, full: 750, total: 480000 },
      '文科': { line1: 520, line2: 418, full: 750, total: 120000 },
      '新高考': { line1: 540, line2: 435, full: 750, total: 600000 },
    };

    function estimateRank(score, subject) {
      const data = gd2025[subject] || gd2025['理科'];
      // 简化估算：正态分布近似
      const mean = 480, std = 80;
      const z = (score - mean) / std;
      const percentile = 0.5 * (1 + erf(z / Math.sqrt(2)));
      return Math.max(1, Math.round((1 - percentile) * data.total));
    }

    function erf(x) {
      const sign = x >= 0 ? 1 : -1;
      x = Math.abs(x);
      const a1=0.254829592, a2=-0.284496736, a3=1.421413741, a4=-1.453152027, a5=1.061405429, p=0.3275911;
      const t = 1/(1 + p*x);
      const y = 1 - (((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
      return sign * y;
    }

    function analyzeScore() {
      const score = parseInt(document.getElementById('totalScore').value);
      const province = document.getElementById('province').value;
      const subject = document.getElementById('subject').value;

      if (!score || score < 0 || score > 750) {
        showToast('请输入有效的高考分数（0-750）', 'error'); return;
      }
      if (!province) { showToast('请选择所在省份', 'error'); return; }
      if (!subject) { showToast('请选择科目类型', 'error'); return; }

      const data = gd2025[subject] || gd2025['理科'];
      const rank = estimateRank(score, subject);
      const diff1 = score - data.line1;
      const schoolCount = Math.max(5, Math.min(300, Math.round((score - 450) * 2.5 + 50)));

      document.getElementById('rScore').textContent = score;
      document.getElementById('rRank').textContent = rank.toLocaleString();
      document.getElementById('rLine1').textContent = diff1 >= 0 ? '+' + diff1 : diff1;
      document.getElementById('rLine1').style.color = diff1 >= 0 ? '#16a34a' : '#dc2626';
      document.getElementById('rCount').textContent = schoolCount;

      // 分段分析
      const segments = [
        { label: '语文', score: parseInt(document.getElementById('chinese').value) || Math.round(score*0.22), max: 150 },
        { label: '数学', score: parseInt(document.getElementById('math').value) || Math.round(score*0.22), max: 150 },
        { label: '外语', score: parseInt(document.getElementById('english').value) || Math.round(score*0.20), max: 150 },
        { label: '选科综合', score: parseInt(document.getElementById('sub1').value) || Math.round(score*0.13), max: 100 },
      ];

      document.getElementById('segmentBars').innerHTML = segments.map(s => {
        const pct = Math.round((s.score / s.max) * 100);
        const color = pct >= 80 ? '#16a34a' : pct >= 65 ? '#2563eb' : pct >= 50 ? '#d97706' : '#dc2626';
        return `
          <div class="segment-row">
            <div class="segment-label">${s.label}</div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${pct}%;background:${color}"></div>
            </div>
            <div class="segment-value">${s.score}/${s.max}</div>
          </div>`;
      }).join('');

      // 可报院校
      const rushSchools = score >= 640 ? [
        { name: '清华大学', score: score + 60 },
        { name: '北京大学', score: score + 55 },
        { name: '复旦大学', score: score + 40 },
      ] : score >= 620 ? [
        { name: '北京大学', score: score + 55 },
        { name: '浙江大学', score: score + 30 },
        { name: '南京大学', score: score + 20 },
      ] : score >= 600 ? [
        { name: '中山大学', score: score + 20 },
        { name: '华南理工大学', score: score + 15 },
        { name: '武汉大学', score: score + 18 },
      ] : [
        { name: '暨南大学', score: score + 15 },
        { name: '华南师范大学', score: score + 12 },
        { name: '广州大学', score: score + 10 },
      ];

      const stableSchools = score >= 620 ? [
        { name: '中山大学', score: score },
        { name: '华南理工大学', score: score - 5 },
        { name: '武汉大学', score: score - 8 },
      ] : score >= 580 ? [
        { name: '暨南大学', score: score - 8 },
        { name: '华南师范大学', score: score - 10 },
        { name: '南方科技大学', score: score + 5 },
      ] : [
        { name: '广州大学', score: score - 5 },
        { name: '深圳大学', score: score },
        { name: '广东工业大学', score: score - 8 },
      ];

      const safeSchools = [
        { name: score >= 580 ? '广东工业大学' : '东莞城市学院', score: score - 20 },
        { name: score >= 580 ? '广东财经大学' : '广州城市理工学院', score: score - 25 },
        { name: score >= 580 ? '广州大学' : '广东医科大学' , score: score - 30 },
      ];

      document.getElementById('rangeSections').innerHTML = `
        <div class="range-section rush">
          <h4>🔥 冲一冲（高于你15-40分）</h4>
          <div class="range-school-list">
            ${rushSchools.map(s => `
              <div class="range-school-item">
                <div class="range-school-name">${s.name}</div>
                <div class="range-school-score">参考分: ${s.score}分</div>
              </div>`).join('')}
          </div>
        </div>
        <div class="range-section stable">
          <h4>✅ 稳一稳（与你分数相近）</h4>
          <div class="range-school-list">
            ${stableSchools.map(s => `
              <div class="range-school-item">
                <div class="range-school-name">${s.name}</div>
                <div class="range-school-score">参考分: ${s.score}分</div>
              </div>`).join('')}
          </div>
        </div>
        <div class="range-section safe">
          <h4>🛡️ 保一保（低于你20-40分）</h4>
          <div class="range-school-list">
            ${safeSchools.map(s => `
              <div class="range-school-item">
                <div class="range-school-name">${s.name}</div>
                <div class="range-school-score">参考分: ${s.score}分</div>
              </div>`).join('')}
          </div>
        </div>
      `;

      document.getElementById('resultArea').classList.add('show');
      document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
      showToast('分析完成！', 'success');
    }
  </script>
</body>
</html>
